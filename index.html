<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dino</title>
    <style>
      body {
        margin: 0;
        background-color: #f0f0f0;
      }
      .controller {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 400px;
      }
      .container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        width: 400px;
        height: 500px;
      }
      .controller button {
        background-color: #dddddd;
        border-radius: 20px;
        margin: 10px 0;
        padding: 8px 15px;
        font-size: 14px;
        cursor: pointer;
        width: 120px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <canvas id="game" class="canvas" width="500" height="500"></canvas>
    </div>
    <div class="">
      <div class="controller">
        <button id="start">Start</button>
        <button id="jump" style="display: none">Jump</button>
      </div>
    </div>
    <script>
      const animationInterval = 60;
      const canvas = document.getElementById("game");
      const ctx = canvas.getContext("2d");

      const walkFrames = loadFrames("images/walk", "walk", 10);
      const jumpFrames = loadFrames("images/jump", "jump", 10);
      const idleFrames = loadFrames("images/idle", "idle", 10);
      const deathFrames = loadFrames("images/death", "walk", 10);

      const jumpButton = document.getElementById("jump");
      const startButton = document.getElementById("start");
      const debugHitboxes = false;

      const obstacleImage = new Image();
      obstacleImage.src = "images/obstacles/poop.png";

      function loadFrames(path, filePrefix, count) {
        return Array.from({ length: count }, (_, i) => {
          const img = new Image();
          img.src = `${path}/${filePrefix}${i + 1}.png`;
          return img;
        });
      }

      class Player {
        isIdle = true;
        isWalking = false;
        isJumping = false;
        isDead = false;
        jumpPower = -15;
        groundY = 365;
        gravity = 0.7;
        currentFrame = 0;
        animationTimer = 0;
        velocityY = 1;
        hitboxes = {
          idle: { offsetX: 70, offsetY: 155, width: 140, height: 155 },
          walk: { offsetX: 30, offsetY: 5, width: 90, height: 120 },
          jump: { offsetX: 30, offsetY: 50, width: 120, height: 60 },
        };

        constructor(x, y, width, height) {
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
        }

        draw(ctx, deltaTime) { 
          if(this.isIdle) {
            const image = idleFrames[this.currentFrame];
            ctx.drawImage(image, this.x, this.y, this.width, this.height);
            this.updateCurrentFrame(deltaTime, this.getCurrentFrames());
          } else if (this.isWalking) {
            const image = walkFrames[this.currentFrame];
            ctx.drawImage(image, this.x, this.y, this.width, this.height);
            this.updateCurrentFrame(deltaTime, this.getCurrentFrames());
          } else if (this.isJumping) {
            this.doJump();
            const image = jumpFrames[this.currentFrame];
            ctx.drawImage(image, this.x, this.y, this.width, this.height);
            this.updateCurrentFrame(deltaTime, this.getCurrentFrames());
          } else if (this.isDead) {
            const image = deathFrames[this.currentFrame];
            ctx.drawImage(image, this.x, this.y, this.width, this.height);
            this.updateCurrentFrame(deltaTime, deathFrames);
          }
        }

        updateCurrentFrame(deltaTime, frames) {
          this.animationTimer += deltaTime;
          
          if (this.animationTimer >= 0.06) {
            this.currentFrame++;

            if (this.currentFrame >= frames.length) {
              this.currentFrame = 0;
            }

            this.animationTimer = 0;
          }
        }

        update(deltaTime) {          
          if (!this.isJumping) {
            return;
          }

          this.velocityY += this.gravity * (deltaTime * 50);
          this.y += this.velocityY * (deltaTime * 50);

          if (this.y >= this.groundY) {
            this.y = this.groundY;
            this.velocityY = 0;
            this.isWalking = true;
            this.isJumping = false;
          }
        }

        getCurrentState() {
          if (this.isJumping) {
            return "jump";
          }

          if (this.isIdle) {
            return "idle";
          }

          return "walk";
        }

        getCurrentFrames() {
          const state = this.getCurrentState();

          if (state === "jump") {
            return jumpFrames;
          }

          if (state === "idle") {
            return idleFrames;
          }

          return walkFrames;
        }


        getHitbox() {
          const hitbox = this.hitboxes[this.getCurrentState()];

          return {
            x: this.x + hitbox.offsetX,
            y: this.y + hitbox.offsetY,
            width: hitbox.width,
            height: hitbox.height,
          };
        }

        doJump() {
          if (this.isJumping) {
            return;
          }

          this.isWalking = false;
          this.isJumping = true;
          this.velocityY = this.jumpPower;
        }
       }

      class BaseGame {
        constructor() {
          this.canvas = document.getElementById("game");
          this.ctx = this.canvas.getContext("2d");
          this.states = {start: false, gameOver: false};
          this.lastTime = null;
          this.score = new Score();
          this.obstacle = new Obstacle(
            "poop",
            canvas.width + 80,
            450,
            50,
            50,
            400,
            obstacleImage,
            canvas,
          );
          this.player = new Player(
            15,
            365,
            290,
            142,
          );

          this.init();
        }

        init() {
          startButton.addEventListener("click", () => {
            startButton.style.display = "none";
            jumpButton.style.display = "inline-block";
            this.restartGame();
          });

          jumpButton.addEventListener("click", () => {
            if (!this.states.gameOver) {
              this.player.doJump();
            }
          });
        }

        restartGame() {
          this.states.gameOver = false;
          this.states.start = true;
          this.obstacle.x = this.canvas.width + 80;
          this.player.y = this.player.groundY;
          this.player.velocityY = 0;
          this.player.isWalking = true;
          this.player.isJumping = false;
          this.player.isIdle = false;
          this.player.currentFrame = 0;
          this.player.animationTimer = 0;
          this.score.reset();
        }

        drawGameOver() {
          startButton.style.display = "inline-block";
          jumpButton.style.display = "none";
          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);
          this.ctx.fillStyle = "#000";
          this.ctx.font = "32px sans-serif";
          this.ctx.fillText("GAME OVER", 155, 185);
          // draw final score
          this.ctx.font = "20px sans-serif";
          this.ctx.fillText(`Score: ${this.score.getScore()}`, 200, 220);

          

          const deathImage = deathFrames[this.player.currentFrame];

          this.obstacle.draw(this.ctx);
          this.player.isWalking = false;
          this.player.isDead = true;
          this.player.draw(this.ctx, deathImage);
        }

        isColliding(a, b) {
          return (
            a.x < b.x + b.width &&
            a.x + a.width > b.x &&
            a.y < b.y + b.height &&
            a.y + a.height > b.y
          );
        }

        collisionDetection() {
          const dinoBox = this.player.getHitbox();
          const obstacleBox = this.obstacle.getHitbox();

          if (!this.states.gameOver && this.isColliding(dinoBox, obstacleBox)) {
            this.states.gameOver = true;
            this.states.start = false;
            this.drawGameOver();
          }

          if (debugHitboxes) {
            this.drawHitbox(obstacleBox, "blue");
            this.drawHitbox(dinoBox, "red");
          }
        }

        drawHitbox(box, color) {
          this.ctx.strokeStyle = color;
          this.ctx.lineWidth = 2;
          this.ctx.strokeRect(box.x, box.y, box.width, box.height);
        }

        play(currentTime = 0) {
          if (this.lastTime === null) {
            this.lastTime = currentTime;
          }

          const deltaTime = (currentTime - this.lastTime) / 1000;
          this.lastTime = currentTime;

          this.ctx.clearRect(0, 0, this.canvas.width, this.canvas.height);

          if (this.states.start && !this.states.gameOver) {

            this.collisionDetection();

            this.score.draw(this.ctx);
            this.score.update(
              deltaTime,
              this.states.gameOver,
              this.states.start,
            );

            // Update and draw obstacle
            this.obstacle.draw(this.ctx);
            this.obstacle.update(deltaTime);

            // Update and draw player
            this.player.draw(this.ctx, deltaTime);
            this.player.update(deltaTime);

          } else if (this.states.gameOver) {
            this.drawGameOver();
          } else if (!this.states.start && !this.states.gameOver) {
            this.player.isIdle = true;
            this.player.draw(this.ctx, deltaTime);
          }

          this.run();
        }

        run() {
          requestAnimationFrame(this.play.bind(this));
        }
      }

     

      class Score {
        constructor() {
          this.score = 0;
          this.points = 10;
        }

        draw(ctx) {
          ctx.fillStyle = "#000";
          ctx.font = "20px sans-serif";
          ctx.fillText(`Score: ${Math.floor(this.score)}`, 340, 30);
        }

        getScore() {
          return Math.floor(this.score);
        }

        update(deltaTime) {
          this.score += this.points * deltaTime;
        }

        reset() {
          this.score = 0;
        }
      }

      class Obstacle {
        constructor(type, x, y, width, height, speed, img, canvas) {
          this.type = type;
          this.x = x;
          this.y = y;
          this.width = width;
          this.height = height;
          this.img = img;
          this.speed = speed;
          this.canvas = canvas;
        }

        draw(ctx) {
          ctx.drawImage(this.img, this.x, this.y, this.width, this.height);
        }

        update(deltaTime) {
          this.x -= this.speed * deltaTime;
          if (this.x + this.width < 0) {
            this.x = this.canvas.width + Math.floor(Math.random() * (450 - 100 + 1)) + 100;
          }
        }

        getHitbox() {
          if (this.type === "poop") {
            return {
              x: this.x + 10,
              y: this.y + 20,
              width: 25,
              height: 25,
            };
          }

          return {
            x: this.x,
            y: this.y,
            width: this.width,
            height: this.height,
          };
        }
      }

      const DinoGame = new BaseGame();
      DinoGame.run();
    </script>
  </body>
</html>
